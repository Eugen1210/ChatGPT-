<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>にゃんこ宝箱ガチャ Ver2</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;touch-action:manipulation;overscroll-behavior:none}
body{
  background:radial-gradient(circle at top,#223056,#080a12 70%);
  color:#fff;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  overflow:hidden;
}
.app{
  max-width:430px;
  min-height:100vh;
  margin:0 auto;
  padding:14px;
  text-align:center;
  position:relative;
}
h1{
  margin:6px 0 8px;
  font-size:25px;
  color:#ffd86b;
  text-shadow:0 0 14px rgba(255,210,80,.65);
}
.status{
  display:flex;
  justify-content:center;
  gap:6px;
  flex-wrap:wrap;
  font-size:12px;
  margin-bottom:8px;
  color:#dbe6ff;
}
.badge{
  padding:5px 9px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
}
.stage{
  position:relative;
  height:390px;
  border-radius:22px;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 25%,rgba(70,120,255,.2),transparent 35%),
    linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.13);
  box-shadow:inset 0 0 28px rgba(0,0,0,.45);
}
.floor{
  position:absolute;
  left:8%;
  right:8%;
  bottom:66px;
  height:16px;
  border-radius:50%;
  background:rgba(0,0,0,.35);
  filter:blur(2px);
}

/* ===== CSS CAT ===== */
.cat{
  position:absolute;
  left:50%;
  bottom:22px;
  width:88px;
  height:78px;
  transform:translateX(-50%);
  z-index:8;
}
.cat.jump{animation:catJump .65s ease}
@keyframes catJump{
  0%{transform:translateX(-50%) translateY(0)}
  45%{transform:translateX(-50%) translateY(-35px)}
  100%{transform:translateX(-50%) translateY(0)}
}
.cat-head{
  position:absolute;
  left:14px;
  top:12px;
  width:60px;
  height:56px;
  background:#f6ead6;
  border:3px solid #2a1b12;
  border-radius:50%;
  box-shadow:0 4px 0 rgba(0,0,0,.18);
}
.cat-head:before,.cat-head:after{
  content:"";
  position:absolute;
  top:-14px;
  width:22px;
  height:22px;
  background:#f6ead6;
  border:3px solid #2a1b12;
  clip-path:polygon(50% 0,0 100%,100% 100%);
}
.cat-head:before{left:4px}
.cat-head:after{right:4px}
.cat-patch{
  position:absolute;
  right:4px;
  top:2px;
  width:25px;
  height:24px;
  background:#3a2a22;
  border-radius:50% 45% 55% 40%;
}
.cat-patch2{
  position:absolute;
  left:4px;
  top:8px;
  width:18px;
  height:18px;
  background:#c98242;
  border-radius:50%;
}
.eye{
  position:absolute;
  top:26px;
  width:8px;
  height:10px;
  background:#111;
  border-radius:50%;
  z-index:2;
}
.eye.left{left:18px}
.eye.right{right:18px}
.cat.surprise .eye{
  width:10px;
  height:12px;
  top:24px;
}
.cat.happy .eye{
  width:12px;
  height:5px;
  top:28px;
  border-radius:50%;
}
.nose{
  position:absolute;
  left:50%;
  top:37px;
  transform:translateX(-50%);
  width:7px;
  height:5px;
  background:#d47f8a;
  border-radius:50%;
  z-index:2;
}
.mouth{
  position:absolute;
  left:50%;
  top:44px;
  transform:translateX(-50%);
  width:18px;
  height:9px;
  border-bottom:3px solid #111;
  border-radius:0 0 20px 20px;
  z-index:2;
}
.cat.surprise .mouth{
  width:12px;
  height:12px;
  border:3px solid #111;
  border-radius:50%;
}
.cat.happy .mouth{
  width:24px;
  height:12px;
  border-bottom:4px solid #111;
}
.cat-message{
  position:absolute;
  left:50%;
  bottom:96px;
  transform:translateX(-50%) scale(.7);
  padding:8px 16px;
  border-radius:999px;
  background:rgba(0,0,0,.72);
  border:1px solid rgba(255,255,255,.22);
  font-weight:900;
  opacity:0;
  z-index:12;
}
.cat-message.show{animation:msgPop .95s ease forwards}
@keyframes msgPop{
  0%{opacity:0;transform:translateX(-50%) scale(.65)}
  25%{opacity:1;transform:translateX(-50%) scale(1.12)}
  100%{opacity:1;transform:translateX(-50%) scale(1)}
}

/* ===== BOX COMMON ===== */
.box{
  position:absolute;
  left:50%;
  top:-170px;
  width:140px;
  height:105px;
  transform:translateX(-50%);
  z-index:6;
  filter:drop-shadow(0 12px 10px rgba(0,0,0,.35));
}
.box.drop{animation:boxDrop .8s cubic-bezier(.2,1.25,.35,1) forwards}
@keyframes boxDrop{
  0%{top:-170px;transform:translateX(-50%) scale(.92)}
  72%{top:122px;transform:translateX(-50%) scale(1.05)}
  87%{top:98px;transform:translateX(-50%) scale(.98)}
  100%{top:112px;transform:translateX(-50%) scale(1)}
}
.box.shake{animation:shake .11s infinite}
@keyframes shake{
  0%{transform:translateX(-50%) rotate(-4deg)}
  50%{transform:translateX(-50%) rotate(4deg)}
  100%{transform:translateX(-50%) rotate(-4deg)}
}
.box.float{animation:boxFloat .8s ease forwards}
@keyframes boxFloat{
  0%{top:112px;transform:translateX(-50%) scale(1)}
  100%{top:72px;transform:translateX(-50%) scale(1.12)}
}
.box.open{animation:boxOpen .45s ease forwards}
@keyframes boxOpen{
  0%{transform:translateX(-50%) scale(1)}
  55%{transform:translateX(-50%) scale(1.18)}
  100%{transform:translateX(-50%) scale(1)}
}

/* cardboard */
.cardboard{
  background:linear-gradient(180deg,#b9834a,#8b5b2c);
  border:4px solid #5a351b;
  border-radius:10px;
}
.cardboard:before{
  content:"";
  position:absolute;
  left:0;
  right:0;
  top:18px;
  height:18px;
  background:rgba(255,235,160,.55);
}
.cardboard:after{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  width:18px;
  height:100%;
  transform:translateX(-50%);
  background:rgba(255,235,160,.42);
}
.cardboard.plain .label{display:none}
.cardboard.delivery .label{
  position:absolute;
  right:10px;
  bottom:12px;
  width:48px;
  height:28px;
  background:#f5ecd8;
  border:2px solid #5a351b;
  border-radius:3px;
}
.cardboard.delivery .label:before{
  content:"にゃんこ村";
  position:absolute;
  left:3px;
  top:4px;
  color:#5a351b;
  font-size:7px;
  font-weight:900;
}
.cardboard.shop:before{
  background:#6fc6ff;
}
.cardboard.shop .smile{
  position:absolute;
  left:32px;
  bottom:18px;
  width:72px;
  height:32px;
  border-bottom:6px solid #1b75bb;
  border-radius:0 0 80px 80px;
}

/* treasure */
.treasure{
  border-radius:18px 18px 10px 10px;
  border:4px solid #2b1b10;
  overflow:hidden;
}
.treasure:before{
  content:"";
  position:absolute;
  left:-4px;
  right:-4px;
  top:-4px;
  height:42px;
  border-radius:18px 18px 4px 4px;
  border:4px solid #2b1b10;
}
.treasure:after{
  content:"";
  position:absolute;
  left:50%;
  top:38px;
  width:28px;
  height:28px;
  transform:translateX(-50%);
  border-radius:50%;
  background:#ffe27a;
  border:3px solid #2b1b10;
}
.treasure.wood{
  background:linear-gradient(180deg,#8b552c,#5a341c);
}
.treasure.wood:before{
  background:linear-gradient(180deg,#a66a37,#6b3e20);
}
.treasure.wood .band,
.treasure.luxury .band{
  position:absolute;
  top:0;
  bottom:0;
  width:16px;
  background:#3c4659;
}
.treasure .band.left{left:18px}
.treasure .band.right{right:18px}
.treasure.luxury{
  background:linear-gradient(180deg,#b40028,#6b0018);
  box-shadow:0 0 25px rgba(255,207,70,.45);
}
.treasure.luxury:before{
  background:linear-gradient(180deg,#ffda6a,#c9951e);
}
.treasure.luxury .band{
  background:linear-gradient(180deg,#ffe27a,#b9851a);
}
.treasure.rainbowize{
  box-shadow:0 0 30px #fff,0 0 65px #41d9ff,0 0 95px #ff4df3;
}
.treasure.rainbowize:before{
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
}

/* effects */
.rainbow{
  position:absolute;
  inset:-40px;
  opacity:0;
  z-index:2;
  background:conic-gradient(red,orange,yellow,lime,cyan,blue,violet,red);
  mix-blend-mode:screen;
}
.rainbow.show{animation:rainbowFlash 1.35s ease forwards}
@keyframes rainbowFlash{
  0%{opacity:0;transform:scale(.75) rotate(0)}
  30%{opacity:.85}
  100%{opacity:0;transform:scale(1.5) rotate(260deg)}
}
.sparkle{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#fff;
  z-index:10;
  animation:sparkle 1.1s ease forwards;
}
@keyframes sparkle{
  0%{opacity:0;transform:scale(.3) translateY(0)}
  30%{opacity:1}
  100%{opacity:0;transform:scale(1.8) translateY(-80px)}
}
.confetti{
  position:absolute;
  top:-20px;
  width:8px;
  height:14px;
  z-index:14;
  animation:fall 1.55s linear forwards;
}
@keyframes fall{
  0%{opacity:1;transform:translateY(0) rotate(0)}
  100%{opacity:0;transform:translateY(430px) rotate(420deg)}
}

/* result */
.result{
  position:absolute;
  left:50%;
  top:225px;
  width:88%;
  transform:translateX(-50%) scale(.7);
  opacity:0;
  z-index:15;
  padding:12px 10px;
  border-radius:18px;
  background:rgba(0,0,0,.72);
  border:1px solid rgba(255,255,255,.18);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.result.show{animation:resultPop .55s ease forwards}
@keyframes resultPop{
  0%{opacity:0;transform:translateX(-50%) scale(.55)}
  60%{opacity:1;transform:translateX(-50%) scale(1.08)}
  100%{opacity:1;transform:translateX(-50%) scale(1)}
}
.rarity{
  font-size:40px;
  font-weight:1000;
  line-height:1;
}
.item{
  margin-top:7px;
  font-size:17px;
  font-weight:800;
}
.n .rarity{color:#d8d8d8}
.r .rarity{color:#66adff}
.sr .rarity{color:#ffd95d}
.ssr .rarity{
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet);
  -webkit-background-clip:text;
  color:transparent;
}

/* controls */
button{
  width:100%;
  height:60px;
  margin-top:16px;
  border:none;
  border-radius:18px;
  color:#231300;
  font-size:22px;
  font-weight:1000;
  background:linear-gradient(180deg,#ffe999,#ff9d2b);
  box-shadow:0 6px 0 #7a4100,0 0 24px rgba(255,170,60,.45);
}
button:active{transform:translateY(3px);box-shadow:0 3px 0 #7a4100}
button:disabled{opacity:.55}
.panel{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  gap:8px;
  font-size:13px;
  color:#dbe6ff;
}
.mini{
  flex:1;
  padding:8px;
  border-radius:12px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
}
.history{
  margin-top:8px;
  height:30px;
  display:flex;
  justify-content:center;
  gap:5px;
}
.history span{
  min-width:34px;
  padding:5px 7px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  font-size:12px;
  font-weight:900;
}
.dev{
  position:absolute;
  right:10px;
  top:10px;
  z-index:20;
  width:auto;
  height:32px;
  padding:0 9px;
  margin:0;
  border-radius:999px;
  font-size:12px;
  box-shadow:none;
  background:rgba(255,255,255,.13);
  color:#fff;
  border:1px solid rgba(255,255,255,.18);
}
.dev.on{background:linear-gradient(90deg,#ff4de1,#4dd8ff);color:#fff}
</style>
</head>
<body>
<div class="app">
  <h1>🐾 にゃんこ宝箱ガチャ</h1>

  <div class="status">
    <span class="badge">N 55%</span>
    <span class="badge">R 30%</span>
    <span class="badge">SR 12%</span>
    <span class="badge">SSR 3%</span>
  </div>

  <div class="stage" id="stage">
    <button class="dev" id="devBtn" onclick="toggleSSR()">SSR確定 OFF</button>
    <div class="rainbow" id="rainbow"></div>
    <div class="floor"></div>

    <div class="box" id="box"></div>

    <div class="result" id="result"></div>

    <div class="cat-message" id="catMessage">にゃ？</div>
    <div class="cat" id="cat">
      <div class="cat-head">
        <div class="cat-patch"></div>
        <div class="cat-patch2"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="nose"></div>
        <div class="mouth"></div>
      </div>
    </div>
  </div>

  <button id="gachaBtn" onclick="startGacha()">ガチャを引く</button>

  <div class="panel">
    <div class="mini">総回数：<span id="count">0</span></div>
    <div class="mini">SSR：<span id="ssrCount">0</span></div>
  </div>

  <div class="history" id="history"></div>
</div>

<script>
let count = Number(localStorage.getItem("v2Count") || 0);
let ssrCount = Number(localStorage.getItem("v2SSR") || 0);
let history = JSON.parse(localStorage.getItem("v2History") || "[]");
let forceSSR = false;

const box = document.getElementById("box");
const result = document.getElementById("result");
const btn = document.getElementById("gachaBtn");
const cat = document.getElementById("cat");
const catMessage = document.getElementById("catMessage");
const rainbow = document.getElementById("rainbow");
const stage = document.getElementById("stage");
const devBtn = document.getElementById("devBtn");

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function save(){
  localStorage.setItem("v2Count", count);
  localStorage.setItem("v2SSR", ssrCount);
  localStorage.setItem("v2History", JSON.stringify(history));
}

function updateUI(){
  document.getElementById("count").textContent = count;
  document.getElementById("ssrCount").textContent = ssrCount;
  const h = document.getElementById("history");
  h.innerHTML = "";
  history.slice(0,5).forEach(x=>{
    const s=document.createElement("span");
    s.textContent=x;
    h.appendChild(s);
  });
  save();
}

function toggleSSR(){
  forceSSR = !forceSSR;
  devBtn.textContent = forceSSR ? "SSR確定 ON" : "SSR確定 OFF";
  devBtn.classList.toggle("on", forceSSR);
}

function drawRarity(){
  if(forceSSR){
    return {name:"SSR", item:"神アプリの種", boxType:"luxury"};
  }

  const r = Math.random()*100;

  if(r < 3){
    return {name:"SSR", item:"神アプリの種", boxType:"luxury"};
  }
  if(r < 15){
    return {name:"SR", item:"レア素材", boxType:"luxury"};
  }
  if(r < 45){
    return {name:"R", item:"青い結晶", boxType:"wood"};
  }

  const nBoxes = ["plain","delivery","shop"];
  return {
    name:"N",
    item:"ふつうの石",
    boxType:"cardboard " + nBoxes[Math.floor(Math.random()*nBoxes.length)]
  };
}

function setupBox(rarity){
  box.className = "box";

  if(rarity.boxType.includes("cardboard")){
    box.classList.add("cardboard");
    rarity.boxType.split(" ").forEach(c=>{
      if(c !== "cardboard") box.classList.add(c);
    });

    box.innerHTML = '<div class="label"></div><div class="smile"></div>';
  } else if(rarity.boxType === "wood"){
    box.classList.add("treasure","wood");
    box.innerHTML = '<div class="band left"></div><div class="band right"></div>';
  } else {
    box.classList.add("treasure","luxury");
    box.innerHTML = '<div class="band left"></div><div class="band right"></div>';
  }

  box.style.top = "-170px";
}

function showResult(rarity){
  const cls = rarity.name.toLowerCase();
  result.className = "result show " + cls;
  result.innerHTML =
    '<div class="rarity">' + rarity.name + '</div>' +
    '<div class="item">' + rarity.item + '</div>';
}

function resetFace(){
  cat.className = "cat";
  catMessage.className = "cat-message";
}

function surpriseFace(){
  cat.className = "cat surprise";
}

function happyFace(){
  cat.className = "cat happy jump";
}

async function startGacha(){
  btn.disabled = true;
  result.className = "result";
  result.innerHTML = "";
  rainbow.className = "rainbow";
  resetFace();

  const rarity = drawRarity();
  setupBox(rarity);

  count++;
  updateUI();

  await sleep(80);

  box.classList.add("drop");
  await sleep(850);

  box.classList.add("shake");
  await sleep(850);

  box.classList.remove("shake");
  await sleep(280);

  if(rarity.name === "SSR"){
    catMessage.textContent = "にゃ？";
    catMessage.classList.add("show");
    surpriseFace();

    await sleep(650);

    box.classList.add("float");
    await sleep(480);

    box.classList.add("rainbowize");
    rainbow.classList.add("show");
    makeSparkles();
    makeConfetti();

    await sleep(850);

    box.classList.add("open");
    showResult(rarity);
    happyFace();

    ssrCount++;
    history.unshift("SSR");
    history = history.slice(0,5);
    updateUI();

    await sleep(1500);

  } else {
    box.classList.add("open");
    await sleep(350);

    showResult(rarity);

    if(rarity.name === "SR"){
      cat.className = "cat happy";
      makeSparkles(10, "#ffd95d");
    } else {
      resetFace();
    }

    history.unshift(rarity.name);
    history = history.slice(0,5);
    updateUI();

    await sleep(1200);
  }

  await sleep(450);
  btn.disabled = false;
}

function makeSparkles(num=22, color="#fff"){
  for(let i=0;i<num;i++){
    const s=document.createElement("div");
    s.className="sparkle";
    s.style.left = Math.random()*88 + 6 + "%";
    s.style.top = Math.random()*58 + 12 + "%";
    s.style.background = color;
    s.style.boxShadow = "0 0 12px " + color;
    stage.appendChild(s);
    setTimeout(()=>s.remove(),1200);
  }
}

function makeConfetti(){
  const colors=["#ff4d4d","#ffd84d","#4dff88","#4dd7ff","#b84dff","#ff7ad9"];
  for(let i=0;i<48;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"%";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDelay=Math.random()*0.35+"s";
    stage.appendChild(c);
    setTimeout(()=>c.remove(),1800);
  }
}

document.addEventListener("touchend",function(e){
  if(e.target.tagName !== "BUTTON") e.preventDefault();
},{passive:false});

updateUI();
</script>
</body>
</html>
