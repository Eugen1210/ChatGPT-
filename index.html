<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>にゃんこ宝箱ガチャ Ver3.1</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;touch-action:manipulation;overscroll-behavior:none;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#070911;color:#fff}
body{background:radial-gradient(circle at 50% 0%,rgba(60,90,180,.35),transparent 38%),linear-gradient(180deg,#151a2c 0%,#070911 100%)}
.app{width:100%;max-width:430px;height:100vh;margin:0 auto;padding:12px;display:flex;flex-direction:column;gap:8px;position:relative}
.header{text-align:center;padding-top:4px}
.title{font-size:25px;font-weight:900;color:#ffd86b;text-shadow:0 0 12px rgba(255,216,107,.6);line-height:1.15}
.subtitle{margin-top:3px;font-size:12px;color:#cdd8ff}
.rates{display:flex;justify-content:center;flex-wrap:wrap;gap:5px;font-size:11px}
.rate{padding:4px 7px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-weight:800}
.stage{position:relative;flex:1;min-height:430px;border-radius:22px;overflow:hidden;background:radial-gradient(circle at 50% 35%,rgba(255,224,120,.15),transparent 34%),linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 0 30px rgba(0,0,0,.45),0 8px 28px rgba(0,0,0,.35)}
.stage::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:32px 32px;opacity:.4}
.counter-panel{position:absolute;left:12px;top:12px;z-index:20;display:flex;flex-direction:column;gap:6px}
.counter-card{min-width:98px;padding:8px 10px;border-radius:13px;background:rgba(0,0,0,.46);border:1px solid rgba(255,215,100,.35);text-align:left}
.counter-card .label{font-size:11px;color:#ffd86b;font-weight:900}
.counter-card .num{font-size:22px;line-height:1.05;font-weight:1000}
.rarity-panel{position:absolute;right:12px;top:12px;z-index:20;padding:9px 11px;border-radius:14px;background:rgba(0,0,0,.46);border:1px solid rgba(255,215,100,.35);font-weight:1000;font-size:15px;text-align:left}
.rarity-panel div{display:flex;gap:10px;justify-content:space-between;min-width:74px}
.n{color:#d8d8d8}.r{color:#64a8ff}.sr{color:#dfe8ff}.ssr{color:#ffd45d}.ur{background:linear-gradient(90deg,#ff4df0,#ffd84d,#60ff8a,#4dd9ff,#b86bff);-webkit-background-clip:text;color:transparent}
.box-dropper{position:absolute;left:50%;top:-260px;width:250px;height:250px;transform:translateX(-50%);z-index:12;display:flex;align-items:center;justify-content:center;will-change:top,transform}
.box-shaker{width:100%;height:100%;display:flex;align-items:center;justify-content:center;will-change:transform}
.box-img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 16px 14px rgba(0,0,0,.45));user-select:none;pointer-events:none}
.box-dropper.drop{animation:boxDrop .72s cubic-bezier(.22,1.32,.34,1) forwards}
@keyframes boxDrop{0%{top:-260px;transform:translateX(-50%) scale(.92)}72%{top:125px;transform:translateX(-50%) scale(1.06)}86%{top:102px;transform:translateX(-50%) scale(.98)}100%{top:116px;transform:translateX(-50%) scale(1)}}
.box-shaker.shake{animation:shake .075s infinite}
@keyframes shake{0%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}100%{transform:rotate(-4deg)}}
.box-dropper.float{animation:boxFloat .65s ease forwards}
@keyframes boxFloat{0%{top:116px;transform:translateX(-50%) scale(1)}100%{top:76px;transform:translateX(-50%) scale(1.14)}}
.box-shaker.open{animation:boxOpen .38s ease forwards}
@keyframes boxOpen{0%{transform:scale(1)}55%{transform:scale(1.16)}100%{transform:scale(1)}}
.impact{position:absolute;left:50%;top:348px;width:190px;height:26px;transform:translateX(-50%) scale(.6);border-radius:50%;background:rgba(0,0,0,.4);filter:blur(4px);opacity:0;z-index:8}
.impact.show{animation:impact .36s ease forwards}
@keyframes impact{0%{opacity:0;transform:translateX(-50%) scale(.4)}40%{opacity:.75;transform:translateX(-50%) scale(1.15)}100%{opacity:.35;transform:translateX(-50%) scale(1)}}
.cat{position:absolute;left:50%;bottom:22px;width:118px;height:118px;transform:translateX(-50%);z-index:18;cursor:pointer}
.cat img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 8px 8px rgba(0,0,0,.4));user-select:none;pointer-events:none}
.cat.jump{animation:catJump .6s ease}
@keyframes catJump{0%{transform:translateX(-50%) translateY(0)}45%{transform:translateX(-50%) translateY(-35px)}100%{transform:translateX(-50%) translateY(0)}}
.cat-message{position:absolute;left:50%;bottom:132px;transform:translateX(-50%) scale(.75);padding:8px 16px;border-radius:999px;background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.22);font-weight:1000;opacity:0;z-index:24}
.cat-message.show{animation:msgPop .65s ease forwards}
@keyframes msgPop{0%{opacity:0;transform:translateX(-50%) scale(.6)}35%{opacity:1;transform:translateX(-50%) scale(1.13)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
.result-card{position:absolute;left:50%;top:270px;width:86%;transform:translateX(-50%) scale(.65);padding:12px 10px;border-radius:18px;background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.18);opacity:0;z-index:30;text-align:center;overflow:hidden}
.result-card.show{animation:resultPop .48s ease forwards}
@keyframes resultPop{0%{opacity:0;transform:translateX(-50%) scale(.55)}60%{opacity:1;transform:translateX(-50%) scale(1.08)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
.result-rarity{font-size:44px;font-weight:1000;line-height:1;white-space:nowrap}
.result-item{margin-top:7px;font-size:17px;font-weight:900;white-space:nowrap}
.awakening-text{position:absolute;left:50%;top:182px;transform:translateX(-50%) scale(.6);width:92%;text-align:center;font-size:34px;font-weight:1000;opacity:0;z-index:42;color:#fff;text-shadow:0 0 10px #fff,0 0 18px #ff4df0,0 0 24px #4dd9ff}
.awakening-text.show{animation:awakeningText 1.15s ease forwards}
@keyframes awakeningText{0%{opacity:0;transform:translateX(-50%) scale(.45)}35%{opacity:1;transform:translateX(-50%) scale(1.15)}70%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) scale(1.18)}}
.rainbow-screen{position:absolute;inset:-30px;opacity:0;z-index:3;background:conic-gradient(red,orange,yellow,lime,cyan,blue,violet,red);mix-blend-mode:screen;pointer-events:none}
.rainbow-screen.show{animation:rainbowFlash 1.2s ease forwards}
@keyframes rainbowFlash{0%{opacity:0;transform:scale(.7) rotate(0)}30%{opacity:.85}100%{opacity:0;transform:scale(1.5) rotate(260deg)}}
.flash{position:absolute;inset:0;background:#fff;opacity:0;z-index:38;pointer-events:none}
.flash.show{animation:flash .46s ease forwards}
@keyframes flash{0%{opacity:0}35%{opacity:.9}100%{opacity:0}}
.all-boxes{position:absolute;left:50%;top:104px;width:96%;transform:translateX(-50%);display:none;justify-content:center;align-items:center;gap:3px;z-index:36}
.all-boxes.show{display:flex;animation:allBoxesPop .75s ease forwards}
.all-boxes img{width:19%;object-fit:contain;filter:drop-shadow(0 8px 6px rgba(0,0,0,.45))}
@keyframes allBoxesPop{0%{opacity:0;transform:translateX(-50%) scale(.6)}35%{opacity:1;transform:translateX(-50%) scale(1.06)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
.sparkle{position:absolute;width:8px;height:8px;border-radius:50%;background:#fff;z-index:34;box-shadow:0 0 12px #fff;animation:sparkleMove 1s ease forwards}
@keyframes sparkleMove{0%{opacity:0;transform:scale(.2) translateY(0)}30%{opacity:1}100%{opacity:0;transform:scale(1.7) translateY(-86px)}}
.confetti{position:absolute;top:-20px;width:8px;height:14px;z-index:45;animation:fall 1.45s linear forwards}
@keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(520px) rotate(420deg)}}
.notice{position:absolute;left:50%;bottom:150px;transform:translateX(-50%);width:86%;padding:10px;border-radius:15px;background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.18);font-size:13px;font-weight:900;color:#ffd86b;opacity:0;z-index:46}
.notice.show{animation:notice .95s ease forwards}
@keyframes notice{0%{opacity:0;transform:translateX(-50%) translateY(12px)}20%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
.controls{display:flex;flex-direction:column;gap:8px}
.gacha-btn{width:100%;height:60px;border:none;border-radius:18px;background:linear-gradient(180deg,#ffe999,#ff9d2b);color:#241300;font-size:22px;font-weight:1000;box-shadow:0 6px 0 #754000,0 0 24px rgba(255,170,60,.45);touch-action:manipulation;user-select:none}
.gacha-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #754000}
.gacha-btn:disabled{opacity:.72}
.history{display:flex;justify-content:center;gap:5px;min-height:30px}
.history span{min-width:34px;padding:5px 7px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);font-size:12px;font-weight:1000}
.next-tease{min-height:20px;text-align:center;color:#ffd86b;font-weight:900;font-size:13px}
@media(max-height:760px){.title{font-size:22px}.stage{min-height:385px}.box-dropper{width:220px;height:220px}.result-card{top:245px}.cat{width:105px;height:105px}@keyframes boxDrop{0%{top:-240px;transform:translateX(-50%) scale(.92)}72%{top:112px;transform:translateX(-50%) scale(1.06)}86%{top:92px;transform:translateX(-50%) scale(.98)}100%{top:102px;transform:translateX(-50%) scale(1)}}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title">🐾 にゃんこ宝箱ガチャ 🐾</div>
    <div class="subtitle">ChatGPTで作ったミニガチャ</div>
  </div>

  <div class="rates">
    <div class="rate n">N 60%</div>
    <div class="rate r">R 25%</div>
    <div class="rate sr">SR 10%</div>
    <div class="rate ssr">SSR 4%</div>
    <div class="rate ur">UR 1%</div>
  </div>

  <div class="stage" id="stage">
    <div class="rainbow-screen" id="rainbowScreen"></div>
    <div class="flash" id="flash"></div>

    <div class="counter-panel">
      <div class="counter-card"><div class="label">総ガチャ数</div><div class="num" id="count">0</div></div>
      <div class="counter-card"><div class="label">UR回数</div><div class="num" id="urCount">0</div></div>
    </div>

    <div class="rarity-panel">
      <div><span class="n">N</span><span>60%</span></div>
      <div><span class="r">R</span><span>25%</span></div>
      <div><span class="sr">SR</span><span>10%</span></div>
      <div><span class="ssr">SSR</span><span>4%</span></div>
      <div><span class="ur">UR</span><span>1%</span></div>
    </div>

    <div class="all-boxes" id="allBoxes">
      <img src="box_n.png"><img src="box_r.png"><img src="box_sr.png"><img src="box_ssr.png"><img src="box_ur.png">
    </div>

    <div class="impact" id="impact"></div>

    <div class="box-dropper" id="boxDropper">
      <div class="box-shaker" id="boxShaker">
        <img class="box-img" id="boxImg" src="box_n.png">
      </div>
    </div>

    <div class="awakening-text" id="awakeningText">🌈 にゃんこ覚醒 🌈</div>

    <div class="result-card" id="resultCard">
      <div class="result-rarity" id="resultRarity"></div>
      <div class="result-item" id="resultItem"></div>
    </div>

    <div class="cat-message" id="catMessage">にゃ？</div>

    <div class="cat" id="cat">
      <img id="catImg" src="cat_normal.png">
    </div>

    <div class="notice" id="notice"></div>
  </div>

  <div class="controls">
    <button class="gacha-btn" id="gachaBtn">ガチャを引く！</button>
    <div class="history" id="history"></div>
    <div class="next-tease" id="nextTease"></div>
  </div>
</div>

<script>
const ASSETS={
  catNormal:"cat_normal.png",
  catSurprise:"cat_surprise.png",
  catHappy:"cat_happy.png",
  catUR:"cat_ur.png",
  boxN:"box_n.png",
  boxR:"box_r.png",
  boxSR:"box_sr.png",
  boxSSR:"box_ssr.png",
  boxUR:"box_ur.png"
};

const RARITIES={
  N:{name:"N",item:"ふつうの石",box:ASSETS.boxN,className:"n"},
  R:{name:"R",item:"青い結晶",box:ASSETS.boxR,className:"r"},
  SR:{name:"SR",item:"銀の猫メダル",box:ASSETS.boxSR,className:"sr"},
  SSR:{name:"SSR",item:"黄金の猫王冠",box:ASSETS.boxSSR,className:"ssr"},
  UR:{name:"UR",item:"伝説の猫のカケラ",box:ASSETS.boxUR,className:"ur"}
};

let count=Number(localStorage.getItem("nyanko_count")||0);
let urCount=Number(localStorage.getItem("nyanko_ur_count")||0);
let history=JSON.parse(localStorage.getItem("nyanko_history")||"[]");
let isPlaying=false;
let catTapCount=0;
let testMode=false;
let testModeStep=0;

const stage=document.getElementById("stage");
const boxDropper=document.getElementById("boxDropper");
const boxShaker=document.getElementById("boxShaker");
const boxImg=document.getElementById("boxImg");
const cat=document.getElementById("cat");
const catImg=document.getElementById("catImg");
const catMessage=document.getElementById("catMessage");
const resultCard=document.getElementById("resultCard");
const resultRarity=document.getElementById("resultRarity");
const resultItem=document.getElementById("resultItem");
const gachaBtn=document.getElementById("gachaBtn");
const impact=document.getElementById("impact");
const rainbowScreen=document.getElementById("rainbowScreen");
const flash=document.getElementById("flash");
const allBoxes=document.getElementById("allBoxes");
const awakeningText=document.getElementById("awakeningText");
const notice=document.getElementById("notice");
const nextTease=document.getElementById("nextTease");

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function save(){localStorage.setItem("nyanko_count",count);localStorage.setItem("nyanko_ur_count",urCount);localStorage.setItem("nyanko_history",JSON.stringify(history))}
function updateUI(){
  document.getElementById("count").textContent=count;
  document.getElementById("urCount").textContent=urCount;
  const h=document.getElementById("history");h.innerHTML="";
  history.slice(0,5).forEach(x=>{const s=document.createElement("span");s.textContent=x;s.className=x.toLowerCase();h.appendChild(s)});
  save();
}
function drawRarity(){
  const r=Math.random()*100;
  if(r<1)return RARITIES.UR;
  if(r<5)return RARITIES.SSR;
  if(r<15)return RARITIES.SR;
  if(r<40)return RARITIES.R;
  return RARITIES.N;
}
function shouldAwakenNormally(rarity){return rarity.name==="UR"&&Math.random()<.10}
function getNextResult(){
  if(testMode){
    testModeStep++;
    if(testModeStep===1)return{rarity:RARITIES.R,awakening:false,forced:true};
    if(testModeStep===2){
      testMode=false;testModeStep=0;
      setTimeout(()=>showNotice("にゃんこ検証モード終了"),500);
      return{rarity:RARITIES.UR,awakening:true,forced:true};
    }
  }
  const rarity=drawRarity();
  return{rarity,awakening:shouldAwakenNormally(rarity),forced:false};
}
function hardResetAnimations(){
  boxDropper.className="box-dropper";
  boxShaker.className="box-shaker";
  void boxDropper.offsetWidth;
  void boxShaker.offsetWidth;
}
function resetStage(){
  hardResetAnimations();
  boxDropper.style.top="-260px";
  boxImg.src=ASSETS.boxN;
  cat.className="cat";
  catImg.src=ASSETS.catNormal;
  catMessage.className="cat-message";
  resultCard.className="result-card";
  resultRarity.textContent="";
  resultItem.textContent="";
  impact.className="impact";
  rainbowScreen.className="rainbow-screen";
  flash.className="flash";
  awakeningText.className="awakening-text";
  allBoxes.className="all-boxes";
  notice.className="notice";
  nextTease.textContent="";
}
function showNotice(text){
  notice.textContent=text;
  notice.className="notice show";
  setTimeout(()=>notice.className="notice",1300);
}
function showCatMessage(text="にゃ？"){
  catMessage.textContent=text;
  catMessage.className="cat-message show";
}
function showResult(rarity){
  resultRarity.textContent=rarity.name;
  resultRarity.className="result-rarity "+rarity.className;
  resultItem.textContent=rarity.item;
  resultCard.className="result-card show";
}
function addHistory(rarity){history.unshift(rarity.name);history=history.slice(0,5)}
function makeSparkles(num=24,color="#fff"){
  for(let i=0;i<num;i++){
    const s=document.createElement("div");
    s.className="sparkle";
    s.style.left=Math.random()*88+6+"%";
    s.style.top=Math.random()*60+12+"%";
    s.style.background=color;
    s.style.boxShadow="0 0 12px "+color;
    stage.appendChild(s);
    setTimeout(()=>s.remove(),1100);
  }
}
function makeConfetti(num=52){
  const colors=["#ff4d4d","#ffd84d","#4dff88","#4dd7ff","#b84dff","#ff7ad9"];
  for(let i=0;i<num;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"%";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDelay=Math.random()*.25+"s";
    stage.appendChild(c);
    setTimeout(()=>c.remove(),1600);
  }
}
async function baseDropSequence(rarity){
  boxImg.src=rarity.box;
  await sleep(30);
  boxDropper.classList.add("drop");
  await sleep(720);
  impact.classList.add("show");
  await sleep(80);
  boxShaker.classList.add("shake");
  await sleep(650);
  boxShaker.classList.remove("shake");
  void boxShaker.offsetWidth;
  await sleep(170);
  showCatMessage("にゃ？");
  catImg.src=ASSETS.catSurprise;
  await sleep(430);
}
async function normalReveal(rarity){
  if(rarity.name==="SR")makeSparkles(14,"#dfe8ff");
  if(rarity.name==="SSR"){makeSparkles(22,"#ffd45d");flash.classList.add("show")}
  if(rarity.name==="UR"){rainbowScreen.classList.add("show");flash.classList.add("show");makeSparkles(35);makeConfetti(48)}
  boxShaker.classList.add("open");
  await sleep(260);
  showResult(rarity);
  if(rarity.name==="UR"){
    catImg.src=ASSETS.catUR;
    cat.classList.add("jump");
  }else if(rarity.name==="SSR"){
    catImg.src=ASSETS.catHappy;
    cat.classList.add("jump");
  }else{
    catImg.src=ASSETS.catNormal;
  }
  await sleep(1050);
  if(rarity.name==="UR")nextTease.textContent="次回：？？？の猫を追加予定...";
}
async function awakeningReveal(){
  catImg.src=ASSETS.catSurprise;
  showCatMessage("にゃ！？");
  await sleep(220);
  flash.classList.add("show");
  await sleep(260);
  allBoxes.classList.add("show");
  await sleep(650);
  rainbowScreen.classList.add("show");
  makeSparkles(42);
  await sleep(420);
  awakeningText.classList.add("show");
  makeConfetti(64);
  await sleep(1050);
  allBoxes.className="all-boxes";
  boxImg.src=ASSETS.boxUR;
  boxDropper.classList.add("float");
  await sleep(430);
  boxShaker.classList.add("open");
  showResult(RARITIES.UR);
  catImg.src=ASSETS.catUR;
  cat.classList.add("jump");
  await sleep(1250);
  nextTease.textContent="次回：？？？の猫を追加予定...";
}
async function startGacha(e){
  if(e){e.preventDefault();e.stopPropagation()}
  if(isPlaying)return;
  isPlaying=true;
  gachaBtn.disabled=true;
  resetStage();
  const {rarity,awakening}=getNextResult();
  count++;
  updateUI();
  await baseDropSequence(rarity);
  if(awakening)await awakeningReveal();
  else await normalReveal(rarity);
  if(rarity.name==="UR")urCount++;
  addHistory(rarity);
  updateUI();
  await sleep(180);
  gachaBtn.disabled=false;
  isPlaying=false;
}
function activateSecretTap(e){
  if(e){e.preventDefault();e.stopPropagation()}
  if(isPlaying)return;
  catTapCount++;
  showNotice("にゃ…？ "+catTapCount+"/7");
  if(catTapCount===1){
    setTimeout(()=>{catTapCount=0},2500);
  }
  if(catTapCount>=7){
    catTapCount=0;
    testMode=true;
    testModeStep=0;
    showNotice("🌈 にゃんこ覚醒スタンバイ 🌈");
  }
}
gachaBtn.addEventListener("pointerdown",startGacha,{passive:false});
cat.addEventListener("pointerdown",activateSecretTap,{passive:false});
document.addEventListener("touchend",e=>{
  if(e.target.tagName!=="BUTTON")e.preventDefault();
},{passive:false});
updateUI();
</script>
</body>
</html>
